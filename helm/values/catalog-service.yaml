image:
  repository: 493042495566.dkr.ecr.us-east-2.amazonaws.com/nimbus-retail/catalog-service
  tag: "21"

secretName: catalog-service-secrets

service:
  type: ClusterIP
  port: 3002
  targetPort: 3000

