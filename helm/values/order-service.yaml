image:
  repository: 493042495566.dkr.ecr.us-east-2.amazonaws.com/nimbus-retail/order-service
  tag: "19"

secretName: order-service-secrets

env:
  - name: PORT
    value: "3000"
  - name: DB_NAME
    value: "orders"
  - name: KAFKA_GROUP_ID
    value: "order-service"

