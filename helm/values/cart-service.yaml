image:
  repository: 493042495566.dkr.ecr.us-east-2.amazonaws.com/nimbus-retail/cart-service
  tag: "22"

secretName: cart-service-secrets

service:
  type: ClusterIP
  port: 3003
  targetPort: 3000

livenessProbe:
  path: /healthz

readinessProbe:
  path: /readyz

env:
  - name: PORT
    value: "3000"
  - name: NODE_TLS_REJECT_UNAUTHORIZED
    value: "0"
  - name: REDIS_URL
    value: "redis://nimbus-retail-redis.hfccii.ng.0001.use2.cache.amazonaws.com:6379"

secretEnv:
  - name: DATABASE_URL
    key: database-url
  - name: JWT_SECRET
    key: jwt-secret
