# ─────────────────────────────────────────
# KAFKA NODE POOL
# single dual-role node (controller + broker)
# ephemeral storage — fine for dev
# ─────────────────────────────────────────
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral

---
# ─────────────────────────────────────────
# KAFKA CLUSTER
# KRaft mode (no ZooKeeper)
# bootstrap: kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
# ─────────────────────────────────────────
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 3.9.0
    metadataVersion: 3.9-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}
