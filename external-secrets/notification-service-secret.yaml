apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: notification-service-secrets
  namespace: nimb
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: notification-service-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: nimbus-retail/notification-service