apiVersion: batch/v1
kind: Job
metadata:
  name: run-migrations
  namespace: nimb
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: postgres:16
          env:
            - name: PGPASSWORD
              value: "newPASS247"
          command:
            - sh
            - -c
            - |
              HOST="nimbus-retail-postgres.c14y0w8mk7d5.us-east-2.rds.amazonaws.com"
              USER="postgres"
              PSQL="psql -h $HOST -U $USER --set=sslmode=require"

              echo "=== auth schema ==="
              $PSQL -d auth -c "
                CREATE SCHEMA IF NOT EXISTS auth;
                CREATE TABLE IF NOT EXISTS auth.users (
                  id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  email         TEXT UNIQUE NOT NULL,
                  password_hash TEXT NOT NULL,
                  created_at    TIMESTAMPTZ NOT NULL DEFAULT now()
                );
              "

              echo "=== cart schema ==="
              $PSQL -d cart -c "
                CREATE SCHEMA IF NOT EXISTS cart;
                CREATE TABLE IF NOT EXISTS cart.carts (
                  user_id    TEXT PRIMARY KEY,
                  items      JSONB NOT NULL DEFAULT '[]',
                  updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
                );
              "

              echo "=== orders schema ==="
              $PSQL -d orders -c "
                CREATE SCHEMA IF NOT EXISTS orders;
                CREATE TABLE IF NOT EXISTS orders.orders (
                  id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  user_id     TEXT NOT NULL,
                  items       JSONB NOT NULL DEFAULT '[]',
                  total_cents INT NOT NULL DEFAULT 0,
                  status      TEXT NOT NULL DEFAULT 'pending',
                  created_at  TIMESTAMPTZ NOT NULL DEFAULT now()
                );
              "

              echo "=== catalog schema ==="
              $PSQL -d catalog -c "
                CREATE SCHEMA IF NOT EXISTS catalog;
                CREATE TABLE IF NOT EXISTS catalog.products (
                  id          TEXT PRIMARY KEY DEFAULT gen_random_uuid()::text,
                  name        TEXT NOT NULL,
                  description TEXT,
                  price_cents INT NOT NULL DEFAULT 0,
                  stock       INT NOT NULL DEFAULT 0
                );
                INSERT INTO catalog.products (name, description, price_cents, stock)
                SELECT 'Nimbus Tee', 'Classic cotton t-shirt', 2999, 100
                WHERE NOT EXISTS (SELECT 1 FROM catalog.products LIMIT 1);
                INSERT INTO catalog.products (name, description, price_cents, stock)
                SELECT 'Cloud Hoodie', 'Warm fleece hoodie', 5999, 50
                WHERE NOT EXISTS (SELECT 1 FROM catalog.products WHERE name = 'Cloud Hoodie');
                INSERT INTO catalog.products (name, description, price_cents, stock)
                SELECT 'Pixel Cap', 'Embroidered snapback', 1999, 200
                WHERE NOT EXISTS (SELECT 1 FROM catalog.products WHERE name = 'Pixel Cap');
              "

              echo "=== all migrations complete ==="
